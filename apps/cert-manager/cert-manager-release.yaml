apiVersion: helm.toolkit.fluxcd.io/v2beta1
kind: HelmRelease
metadata:
  name: cert-manager
  namespace: cert-manager
spec:
  releaseName: cert-manager
  interval: 10m
  chart:
    spec:
      chart: cert-manager
      version: "v1.14.0" # Use a stable version
      sourceRef:
        kind: HelmRepository
        name: jetstack-charts
        namespace: flux-system
  values:
    installCRDs: true # CRITICAL: This installs the Certificate Custom Resources
