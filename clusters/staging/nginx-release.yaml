apiVersion: helm.toolkit.fluxcd.io/v2beta1
kind: HelmRelease
metadata:
  name: my-nginx
  namespace: default
spec:
  interval: 5m
  chart:
    spec:
      chart: ./charts/nginx # Path to the chart in your Git repo
      sourceRef:
        kind: GitRepository
        name: nginx-source
        namespace: flux-system
  values:
    image:
      tag: "latest" # Overriding the template value
