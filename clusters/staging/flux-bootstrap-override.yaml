apiVersion: source.toolkit.fluxcd.io/v1
kind: GitRepository
metadata:
  name: flux-system
  namespace: flux-system
spec:
  interval: 1m0s
  ref:
    tag: v2.0.0
  secretRef:
    name: flux-system
  url: https://github.com/trainmefordevsecops/gitops-repo
---
# Driver 2: Manages your Staging Applications (Nginx, Cert-Manager)
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: flux-staging-apps
  namespace: flux-system
spec:
  interval: 1m0s
  path: ./clusters/staging
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
