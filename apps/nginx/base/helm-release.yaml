apiVersion: helm.toolkit.fluxcd.io/v2beta1
kind: HelmRelease
metadata:
  name: nginx-poc
  namespace: staging
spec:
  interval: 5m
  chart:
    spec:
      chart: ./apps/nginx/charts/nginx  # Path inside your Git repo
      sourceRef:
        kind: GitRepository
        name: flux-system
        namespace: flux-system
  values:
    replicaCount: 1
    image:
      tag: "latest"
